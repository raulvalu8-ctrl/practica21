<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Interactiva - JS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background-color: #f4f4f9; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 350px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 10px; cursor: pointer; border: none; border-radius: 4px; color: white; margin-bottom: 5px; transition: 0.3s; }
        .btn-suma { background-color: #27ae60; }
        .btn-resta { background-color: #2980b9; }
        .btn-div { background-color: #f39c12; }
        .btn-exp { background-color: #8e44ad; }
        button:hover { opacity: 0.8; }
        #resultado { margin-top: 20px; font-weight: bold; font-size: 1.2em; color: #333; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Calculadora de Práctica</h3>
        
        <label>Número 1:</label>
        <input type="number" id="n1" placeholder="Ej: 10">
        
        <label>Número 2:</label>
        <input type="number" id="n2" placeholder="Ej: 5">

        <hr>
        
        <button class="btn-suma" onclick="operacion('suma')">Sumar</button>
        <button class="btn-resta" onclick="operacion('resta')">Restar</button>
        <button class="btn-div" onclick="operacion('division')">Dividir</button>
        <button class="btn-exp" onclick="operacion('exponente')">Exponenciación</button>

        <div id="resultado">Resultado: -</div>
    </div>

    <script>
        function operacion(tipo) {
            // Obtenemos los valores de las cajas de texto y los convertimos a números
            let num1 = parseFloat(document.getElementById('n1').value);
            let num2 = parseFloat(document.getElementById('n2').value);
            let res = 0;
            let simbolo = "";

            // Validar que no estén vacíos
            if (isNaN(num1) || isNaN(num2)) {
                alert("Por favor, ingresa ambos números.");
                return;
            }

            // Lógica según el botón presionado
            if (tipo === 'suma') {
                res = num1 + num2;
                simbolo = "+";
            } else if (tipo === 'resta') {
                res = num1 - num2;
                simbolo = "-";
            } else if (tipo === 'division') {
                if (num2 === 0) {
                    alert("No se puede dividir por cero.");
                    return;
                }
                res = num1 / num2;
                simbolo = "/";
            } else if (tipo === 'exponente') {
                res = num1 ** num2;
                simbolo = "^";
            }

            // Mostrar el resultado en el HTML
            document.getElementById('resultado').innerHTML = `Resultado: ${num1} ${simbolo} ${num2} = ${res}`;
        }
    </script>
</body>
</html>
